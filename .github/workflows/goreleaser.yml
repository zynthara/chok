# Tag-driven goreleaser release.
#
# Releases are cut manually as of v2 (release-please retired: its
# commit-counting versioning cannot express the human-paced
# v2.0.0-beta.N series and it had already mis-opened a duplicate
# release PR from pre-/v2 history). The flow: update CHANGELOG.md,
# tag vX.Y.Z[-pre.N], push the tag; this workflow builds and
# publishes the GitHub Release. goreleaser is idempotent over an
# existing release thanks to mode: replace, so rerunning a release
# tag from the GitHub UI is safe.

name: goreleaser

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to publish releases
  packages: write   # reserved for future container images

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # full history → goreleaser changelog generation

      - name: setup-go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      # syft powers the `sboms:` section of .goreleaser.yaml — without
      # it the release run fails fast instead of shipping SBOM-less.
      - name: install syft (SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
