# Tag-driven goreleaser fallback.
#
# Normal release flow: release-please.yml inlines goreleaser, so the
# automatic v* tag it creates triggers a build inside the same job —
# bypassing GitHub's anti-loop policy that suppresses cross-workflow
# triggers from GITHUB_TOKEN-created tags.
#
# This separate workflow stays as a manual fallback for ad-hoc tag
# pushes (`git tag vX.Y.Z && git push --tags` from a developer
# machine, or rerunning a release tag from the GitHub UI). goreleaser
# is idempotent over an existing release thanks to mode: replace.

name: goreleaser

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to publish releases
  packages: write   # reserved for future container images

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → goreleaser changelog generation

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
