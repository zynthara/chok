# Run on every push to main and every PR. Catches the things that
# would otherwise force a release-please-followed-by-revert cycle:
# build breakage, vet warnings, test regressions.

name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # The M3 database matrix (SPEC §12.6 budget): the full suite runs
    # once on SQLite; only store/db rerun against the Postgres service.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chok
          POSTGRES_PASSWORD: chok
          POSTGRES_DB: choktest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Honour the minimum version declared in go.mod so we never
          # silently regress to an older toolchain than the module
          # itself requires.
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race -count=1 ./...

      - name: test (store/db on Postgres)
        env:
          CHOK_TEST_DRIVER: postgres
          CHOK_TEST_PG_DSN: postgres://chok:chok@localhost:5432/choktest?sslmode=disable
        run: go test -race -count=1 ./store/... ./db/...

      - name: build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true   # treat lint as advisory until rules stabilise
