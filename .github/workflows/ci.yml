# Run on every push to main and every PR. Catches the things that
# would otherwise force a release-please-followed-by-revert cycle:
# build breakage, vet warnings, test regressions.

name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Honour the minimum version declared in go.mod so we never
          # silently regress to an older toolchain than the module
          # itself requires.
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race -count=1 ./...

      - name: build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true   # treat lint as advisory until rules stabilise
