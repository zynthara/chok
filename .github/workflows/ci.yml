# Run on every push to main and every PR. Catches the things that
# would otherwise force a release-please-followed-by-revert cycle:
# build breakage, vet warnings, test regressions.

name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # The full suite runs once on SQLite; store/db rerun against Postgres,
    # and targeted store/migration semantics run against MySQL.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chok
          POSTGRES_PASSWORD: chok
          POSTGRES_DB: choktest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: choktest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history: the apidiff gate resolves the release
          # baseline tag and diffs CHANGELOG.md against it.
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          # Honour the minimum version declared in go.mod so we never
          # silently regress to an older toolchain than the module
          # itself requires.
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race -count=1 ./...

      - name: test (data and battery schemas on Postgres)
        env:
          CHOK_TEST_DRIVER: postgres
          CHOK_TEST_PG_DSN: postgres://chok:chok@localhost:5432/choktest?sslmode=disable
        run: go test -race -count=1 ./store/... ./db/... ./account/... ./audit/... ./authz/...

      - name: test (store semantics, migration audit and battery schemas on MySQL)
        env:
          CHOK_TEST_MYSQL_DSN: root:root@tcp(localhost:3306)/?parseTime=true
        run: go test -race -count=1 ./store ./db ./account ./audit ./authz -run 'TestBatchUpsert_MySQLIgnoresDeclaredConflictTarget|TestApplyMigrations_MySQLPartialDDL|TestSequenceManifest_MySQLClaimAndRepair|TestReadOnly_MySQLDriverBackstop|TestMigrationSequence_MySQLSchemaEquivalent'

      - name: build
        run: go build ./...

      # SPEC §7.4 gates: generated surfaces must be current (drift is
      # red), the public API may only change alongside a changelog
      # entry, and the quickstart must actually boot. The JSON Schema
      # validation of example yamls rides the test step
      # (internal/docgen TestJSONSchema_ValidatesExampleYAMLs).
      - name: generated docs are current (docs gen --check)
        run: go run ./cmd/chok docs gen --check

      - name: blog assembly is current (sync --check)
        run: go run ./cmd/chok sync --check --config examples/blog/chok.yaml --dir examples/blog

      - name: apidiff vs release baseline
        run: ./hack/apidiff.sh

      - name: examples smoke (boot blog, SIGINT, clean exit)
        run: make smoke

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true   # treat lint as advisory until rules stabilise
